---
catalyst_center_hosts:
    hosts:
        catalyst_center220:
            #(Mandatory) CatC Ip address
            catalyst_center_host:  <Catalyst Center IP Address>
            #(Mandatory) CatC UI admin Password
            catalyst_center_password: <Catalyst Center admin Password>
            catalyst_center_port: 443
            catalyst_center_timeout: 60
            #(Mandatory) CatC UI admin username
            catalyst_center_username: <Catalyst Center admin username> 
            catalyst_center_verify: false
            #(Mandatory) Catalyst Center Release version
            catalyst_center_version: <Catalyst Center Release version>
            catalyst_center_debug: true
            catalyst_center_log_level: INFO
            catalyst_center_log: true
            #(Optional) Python interpreter path, use this cli to find the path in your virtual environment:
            # python -c "import sys; print(sys.executable)"
            ansible_python_interpreter: <your python interpreter path>
