---
- name: Normalize requested source and destination device identifiers
  set_fact:
    source_device_identifier_count: >-
      {{
        [
          migration_item.source_device_ip | default(''),
          migration_item.source_device_hostname | default(''),
          migration_item.source_device_serial_number | default('')
        ]
        | reject('equalto', '')
        | list
        | length
      }}
    destination_device_identifier_count: >-
      {{
        [
          migration_item.destination_device_ip | default(''),
          migration_item.destination_device_hostname | default(''),
          migration_item.destination_device_serial_number | default('')
        ]
        | reject('equalto', '')
        | list
        | length
      }}
    source_device_identifier_type: >-
      {{
        'device_ip'
        if (migration_item.source_device_ip | default('') | length) > 0
        else (
          'hostname'
          if (migration_item.source_device_hostname | default('') | length) > 0
          else (
            'serial_number'
            if (migration_item.source_device_serial_number | default('') | length) > 0
            else ''
          )
        )
      }}
    destination_device_identifier_type: >-
      {{
        'device_ip'
        if (migration_item.destination_device_ip | default('') | length) > 0
        else (
          'hostname'
          if (migration_item.destination_device_hostname | default('') | length) > 0
          else (
            'serial_number'
            if (migration_item.destination_device_serial_number | default('') | length) > 0
            else ''
          )
        )
      }}
    source_device_identifier_value: >-
      {{
        migration_item.source_device_ip
        | default(migration_item.source_device_hostname | default(migration_item.source_device_serial_number | default('')))
      }}
    destination_device_identifier_value: >-
      {{
        migration_item.destination_device_ip
        | default(migration_item.destination_device_hostname | default(migration_item.destination_device_serial_number | default('')))
      }}
    source_device_display: >-
      {{
        'source['
        ~ (
          'ip_address=' ~ migration_item.source_device_ip
          if (migration_item.source_device_ip | default('') | length) > 0
          else (
            'hostname=' ~ migration_item.source_device_hostname
            if (migration_item.source_device_hostname | default('') | length) > 0
            else (
              'serial_number=' ~ migration_item.source_device_serial_number
              if (migration_item.source_device_serial_number | default('') | length) > 0
              else 'undefined'
            )
          )
        )
        ~ ']'
      }}
    destination_device_display: >-
      {{
        'destination['
        ~ (
          'ip_address=' ~ migration_item.destination_device_ip
          if (migration_item.destination_device_ip | default('') | length) > 0
          else (
            'hostname=' ~ migration_item.destination_device_hostname
            if (migration_item.destination_device_hostname | default('') | length) > 0
            else (
              'serial_number=' ~ migration_item.destination_device_serial_number
              if (migration_item.destination_device_serial_number | default('') | length) > 0
              else 'undefined'
            )
          )
        )
        ~ ']'
      }}

- name: Validate source identifier input
  fail:
    msg: >-
      Each migration entry must define exactly one source identifier:
      source_device_ip, source_device_hostname, or source_device_serial_number.
      Found {{ source_device_identifier_count }} value(s) for {{ source_device_display }}.
  when: (source_device_identifier_count | int) != 1

- name: Validate destination identifier input
  fail:
    msg: >-
      Each migration entry must define exactly one destination identifier:
      destination_device_ip, destination_device_hostname, or destination_device_serial_number.
      Found {{ destination_device_identifier_count }} value(s) for {{ destination_device_display }}.
  when: (destination_device_identifier_count | int) != 1

- name: Resolve source device in inventory
  cisco.catalystcenter.network_device_info:
    catalystcenter_host: "{{ catalyst_center_login.catalystcenter_host }}"
    catalystcenter_username: "{{ catalyst_center_login.catalystcenter_username }}"
    catalystcenter_password: "{{ catalyst_center_login.catalystcenter_password }}"
    catalystcenter_version: "{{ catalyst_center_login.catalystcenter_version }}"
    catalystcenter_port: "{{ catalyst_center_login.catalystcenter_port }}"
    catalystcenter_verify: "{{ catalyst_center_login.catalystcenter_verify }}"
    catalystcenter_debug: "{{ catalyst_center_login.catalystcenter_debug }}"
    catalystcenter_log: "{{ catalyst_center_login.catalystcenter_log }}"
    catalystcenter_log_level: "{{ catalyst_center_login.catalystcenter_log_level }}"
    catalystcenter_log_file_path: "{{ catalyst_center_login.catalystcenter_log_file_path }}"
    catalystcenter_log_append: "{{ catalyst_center_login.catalystcenter_log_append }}"
    catalystcenter_api_task_timeout: "{{ catalyst_center_login.catalystcenter_api_task_timeout }}"
    managementIpAddress: "{{ [migration_item.source_device_ip] if source_device_identifier_type == 'device_ip' else omit }}"
    hostname: "{{ [migration_item.source_device_hostname] if source_device_identifier_type == 'hostname' else omit }}"
    serialNumber: "{{ [migration_item.source_device_serial_number] if source_device_identifier_type == 'serial_number' else omit }}"
    limit: 10
  register: source_device_lookup
  changed_when: false

- name: Validate source inventory lookup result
  fail:
    msg: >-
      Expected exactly one inventory match for {{ source_device_display }} in fabric site
      {{ migration_item.fabric_site }}, found
      {{ source_device_lookup.dnac_response.response | default([]) | length }}.
  when: (source_device_lookup.dnac_response.response | default([]) | length) != 1

- name: Resolve destination device in inventory
  cisco.catalystcenter.network_device_info:
    catalystcenter_host: "{{ catalyst_center_login.catalystcenter_host }}"
    catalystcenter_username: "{{ catalyst_center_login.catalystcenter_username }}"
    catalystcenter_password: "{{ catalyst_center_login.catalystcenter_password }}"
    catalystcenter_version: "{{ catalyst_center_login.catalystcenter_version }}"
    catalystcenter_port: "{{ catalyst_center_login.catalystcenter_port }}"
    catalystcenter_verify: "{{ catalyst_center_login.catalystcenter_verify }}"
    catalystcenter_debug: "{{ catalyst_center_login.catalystcenter_debug }}"
    catalystcenter_log: "{{ catalyst_center_login.catalystcenter_log }}"
    catalystcenter_log_level: "{{ catalyst_center_login.catalystcenter_log_level }}"
    catalystcenter_log_file_path: "{{ catalyst_center_login.catalystcenter_log_file_path }}"
    catalystcenter_log_append: "{{ catalyst_center_login.catalystcenter_log_append }}"
    catalystcenter_api_task_timeout: "{{ catalyst_center_login.catalystcenter_api_task_timeout }}"
    managementIpAddress: "{{ [migration_item.destination_device_ip] if destination_device_identifier_type == 'device_ip' else omit }}"
    hostname: "{{ [migration_item.destination_device_hostname] if destination_device_identifier_type == 'hostname' else omit }}"
    serialNumber: "{{ [migration_item.destination_device_serial_number] if destination_device_identifier_type == 'serial_number' else omit }}"
    limit: 10
  register: destination_device_lookup
  changed_when: false

- name: Validate destination inventory lookup result
  fail:
    msg: >-
      Expected exactly one inventory match for {{ destination_device_display }} in fabric site
      {{ migration_item.fabric_site }}, found
      {{ destination_device_lookup.dnac_response.response | default([]) | length }}.
  when: (destination_device_lookup.dnac_response.response | default([]) | length) != 1

- name: Capture resolved source and destination device records
  set_fact:
    source_resolved_device: "{{ source_device_lookup.dnac_response.response[0] | default({}) }}"
    destination_resolved_device: "{{ destination_device_lookup.dnac_response.response[0] | default({}) }}"

- name: Validate source and destination are not the same resolved device
  fail:
    msg: >-
      Source and destination must resolve to different devices.
      Resolved source={{ source_resolved_device.managementIpAddress | default(source_device_display) }},
      resolved destination={{ destination_resolved_device.managementIpAddress | default(destination_device_display) }}.
  when: >-
    {{
      (source_resolved_device.managementIpAddress | default('')) != ''
      and
      (source_resolved_device.managementIpAddress | default(''))
      ==
      (destination_resolved_device.managementIpAddress | default(''))
    }}

- name: Build generated source config file path for migration
  set_fact:
    generated_source_config_file_path: >-
      {{ generated_config_dir }}/sda_port_assignment_source_{{ source_device_identifier_type }}_{{ source_device_identifier_value |
      regex_replace('[^A-Za-z0-9]', '_') }}_to_{{ destination_device_identifier_type }}_{{ destination_device_identifier_value |
      regex_replace('[^A-Za-z0-9]', '_') }}.yml

- name: Remove stale generated source config file before export
  ansible.builtin.file:
    path: "{{ generated_source_config_file_path }}"
    state: absent
  changed_when: false

- name: Initialize source export mode
  set_fact:
    source_export_filter_mode: "{{ source_device_identifier_type }}"

- name: Export source device port assignments with identifier-aware filter
  cisco.catalystcenter.sda_host_port_onboarding_playbook_config_generator:
    catalystcenter_host: "{{ catalyst_center_login.catalystcenter_host }}"
    catalystcenter_username: "{{ catalyst_center_login.catalystcenter_username }}"
    catalystcenter_password: "{{ catalyst_center_login.catalystcenter_password }}"
    catalystcenter_version: "{{ catalyst_center_login.catalystcenter_version }}"
    catalystcenter_port: "{{ catalyst_center_login.catalystcenter_port }}"
    catalystcenter_verify: "{{ catalyst_center_login.catalystcenter_verify }}"
    catalystcenter_debug: "{{ catalyst_center_login.catalystcenter_debug }}"
    catalystcenter_log: "{{ catalyst_center_login.catalystcenter_log }}"
    catalystcenter_log_level: "{{ catalyst_center_login.catalystcenter_log_level }}"
    catalystcenter_log_file_path: "{{ catalyst_center_login.catalystcenter_log_file_path }}"
    catalystcenter_log_append: "{{ catalyst_center_login.catalystcenter_log_append }}"
    catalystcenter_api_task_timeout: "{{ catalyst_center_login.catalystcenter_api_task_timeout }}"
    state: gathered
    file_path: "{{ generated_source_config_file_path }}"
    file_mode: overwrite
    config:
      component_specific_filters:
        components_list:
          - port_assignments
        port_assignments:
          - "{{ source_export_port_assignment_filter }}"
  register: source_port_assignment_export
  changed_when: false
  failed_when: false
  vars:
    source_export_port_assignment_filter: >-
      {{
        {'fabric_site_name_hierarchy': migration_item.fabric_site}
        | combine({'device_ips': [source_device_identifier_value]} if source_device_identifier_type == 'device_ip' else {})
        | combine({'hostnames': [source_device_identifier_value]} if source_device_identifier_type == 'hostname' else {})
        | combine({'serial_numbers': [source_device_identifier_value]} if source_device_identifier_type == 'serial_number' else {})
      }}

- name: Check for SDK installation error in export attempt
  fail:
    msg: |
      ❌ CRITICAL ERROR: Catalyst Center Python SDK is not installed!
      
      The playbook cannot continue because the required Python SDK is missing.
      
      Error Details:
        - Module: cisco.catalystcenter.sda_host_port_onboarding_playbook_config_generator
        - Error: {{ source_port_assignment_export.module_stderr | default('SDK not found') }}
      
      To fix this issue:
        1. Activate your virtual environment:
           source venv/bin/activate  # or source /Users/pawansi/ansiblevenv/bin/activate
        
        2. Install the Catalyst Center SDK:
           pip install catalystcentersdk
        
        3. Verify installation:
           pip list | grep catalystcentersdk
        
        4. Re-run the playbook
      
      For more information, see the MIGRATION_GUIDE.md file.
  when:
    - source_port_assignment_export.module_stderr is defined
    - "'catalystcentersdk' in source_port_assignment_export.module_stderr"

- name: Check for module execution failure in export attempt
  fail:
    msg: |
      ❌ ERROR: Module execution failed during source export!
      
      Migration Details:
        - Source Device: {{ source_device_display }}
        - Destination Device: {{ destination_device_display }}
        - Fabric Site: {{ migration_item.fabric_site }}
        - Export Mode: {{ source_export_filter_mode }}
      
      Error Details:
        - Return Code: {{ source_port_assignment_export.rc | default('unknown') }}
        - Error Message: {{ source_port_assignment_export.msg | default('No error message') }}
        - Module Output: {{ source_port_assignment_export.module_stdout | default('No output') }}
        - Module Error: {{ source_port_assignment_export.module_stderr | default('No stderr') }}
      
      Troubleshooting:
        1. Check if Catalyst Center is reachable
        2. Verify credentials in inventory file
        3. Check Catalyst Center version compatibility
        4. Review the error message above for specific issues
        5. Run with -vvv for detailed debug output
  when:
    - not (source_port_assignment_export.module_stderr is defined and 'catalystcentersdk' in source_port_assignment_export.module_stderr)
    - >
      (source_port_assignment_export.failed | default(false))
      or
      (source_port_assignment_export.rc is defined and source_port_assignment_export.rc != 0)
      or
      (source_port_assignment_export.msg is defined and source_port_assignment_export.msg is string and 'error' in (source_port_assignment_export.msg | lower))
      or
      (source_port_assignment_export.msg is defined and source_port_assignment_export.msg is string and 'exception' in (source_port_assignment_export.msg | lower))

- name: Check generated source config file after export
  ansible.builtin.stat:
    path: "{{ generated_source_config_file_path }}"
  register: generated_source_config_file_stat_final
  changed_when: false

- name: Track export mode
  set_fact:
    source_export_filter_mode: >-
      {{
        source_device_identifier_type
        if generated_source_config_file_stat_final.stat.exists else
        'no_data'
      }}

- name: Check if export found no configurations
  fail:
    msg: |
      ❌ ERROR: No port assignments found for source device!
      
      Migration Details:
        - Source Device: {{ source_device_display }}
        - Destination Device: {{ destination_device_display }}
        - Fabric Site: {{ migration_item.fabric_site }}
        - Export Mode: {{ source_export_filter_mode }}
      
      Module Response:
        {{ source_port_assignment_export.msg | default(source_port_assignment_export.response) | to_nice_yaml }}
      
      Problem:
        The export module executed successfully but found no port assignment configurations
        for the source device in the specified fabric site.
      
      Possible Causes:
        1. Source device {{ source_device_display }} does not exist in Catalyst Center inventory
        2. Source device is not part of fabric site {{ migration_item.fabric_site }}
        3. No port assignments have been configured on the source device
        4. Fabric site name hierarchy {{ migration_item.fabric_site }} is incorrect
        5. Source device identifier {{ source_device_display }} is incorrect
      
      Verification Steps:
        1. Check if source device exists in Catalyst Center:
           - Navigate to Inventory in Catalyst Center UI
           - Search for: {{ source_device_display }}
        
        2. Verify fabric site assignment:
           - Go to SDA > Fabric Infrastructure
           - Check if device is assigned to {{ migration_item.fabric_site }}
        
        3. Check port assignments:
           - Go to SDA > Host Onboarding
           - Look for port assignments on {{ source_device_display }}
        
        4. Verify fabric site name:
           - Ensure the full hierarchy path is correct
           - Example: Global/USA/California/SanJose/Building1
      
      Next Steps:
        1. Verify the source identifier {{ source_device_display }} is correct
        2. Verify fabric_site: {{ migration_item.fabric_site }} is the full hierarchy path
        3. Ensure port assignments exist on the source device before migration
        4. Run: ansible-playbook ... -vvv for detailed API responses
  when:
    - not generated_source_config_file_stat_final.stat.exists
    - source_port_assignment_export.msg is defined
    - source_port_assignment_export.msg is mapping
    - source_port_assignment_export.msg.components_processed is defined
    - source_port_assignment_export.msg.components_processed == 0
    - source_port_assignment_export.msg.message is defined
    - "'No configurations found' in source_port_assignment_export.msg.message"

- name: Fail when source export returned error and no file was generated
  fail:
    msg: |
      ❌ ERROR: Source port assignment export failed!
      
      Migration Details:
        - Source Device: {{ source_device_display }}
        - Destination Device: {{ destination_device_display }}
        - Fabric Site: {{ migration_item.fabric_site }}
        - Export Mode: {{ source_export_filter_mode }}
        - Config File: {{ generated_source_config_file_path }}
      
      Failure Reason:
        No configuration file was generated and the module reported an error.
      
      Module Response:
        - Status: {{ source_port_assignment_export.status | default('unknown') }}
        - Message: {{ source_port_assignment_export.msg | default('No message') }}
        - Response: {{ source_port_assignment_export.response | default('No response') }}
      
      Possible Causes:
        1. Source device {{ source_device_display }} does not exist in Catalyst Center
        2. Fabric site {{ migration_item.fabric_site }} is incorrect or does not exist
        3. No port assignments exist for the source device
        4. Network connectivity issues with Catalyst Center
        5. Insufficient permissions for the API user
      
      Next Steps:
        1. Verify the source identifier is correct and exists in inventory
        2. Verify the fabric site name hierarchy is correct
        3. Check Catalyst Center logs for more details
        4. Run the playbook with -vvv for verbose output
  when:
    - not generated_source_config_file_stat_final.stat.exists
    - (source_port_assignment_export.failed | default(false))
      or
      (
        source_port_assignment_export.status is defined
        and (source_port_assignment_export.status | string | lower) not in ['success', 'ok']
      )

- name: Load generated source port assignment configuration
  ansible.builtin.include_vars:
    file: "{{ generated_source_config_file_path }}"
    name: generated_source_config
  when: generated_source_config_file_stat_final.stat.exists

- name: Initialize empty generated source config when export produced no file
  set_fact:
    generated_source_config:
      config: []
  when: not generated_source_config_file_stat_final.stat.exists

- name: Find source device port assignment entry
  set_fact:
    source_device_port_assignment_entry: >-
      {{
        source_device_port_assignment_entry_by_ip
        if source_device_port_assignment_entry_by_ip != {}
        else source_device_port_assignment_entry_by_hostname
      }}
  vars:
    source_device_port_assignment_entry_by_ip: >-
      {{
        (generated_source_config.config | default([])
         | selectattr('ip_address', 'defined')
         | selectattr('ip_address', 'equalto', source_resolved_device.managementIpAddress | default(''))
         | list
         | first) | default({})
      }}
    source_device_port_assignment_entry_by_hostname: >-
      {{
        (generated_source_config.config | default([])
         | selectattr('hostname', 'defined')
         | selectattr('hostname', 'equalto', source_resolved_device.hostname | default(''))
         | list
         | first) | default({})
      }}

- name: Capture source device port assignments for migration
  set_fact:
    source_port_assignments_for_migration: "{{ source_device_port_assignment_entry.port_assignments | default([]) }}"

- name: Capture source interface names and requested interface mappings
  set_fact:
    source_interface_names: "{{ source_port_assignments_for_migration | map(attribute='interface_name') | list }}"
    source_has_port_assignments: "{{ (source_port_assignments_for_migration | length) > 0 }}"
    requested_interface_mappings: "{{ migration_item.interface_mappings | default([]) }}"

- name: Notify when no source port assignment onboarding exists
  debug:
    msg: >-
      No port assignment onboarding exists for source device {{ source_device_display }}
      in fabric site {{ migration_item.fabric_site }}. Nothing to migrate for this entry.
  when: not source_has_port_assignments

- name: Validate mapped source interfaces are unique
  fail:
    msg: |
      ❌ VALIDATION ERROR: Duplicate source interface names in interface_mappings!
      
      Migration Details:
        - Source Device: {{ source_device_display }}
        - Destination Device: {{ destination_device_display }}
        - Fabric Site: {{ migration_item.fabric_site }}
      
      Problem:
        The interface_mappings list contains duplicate source_interface_name entries.
        Each source interface can only be mapped once.
      
      Duplicate Check:
        - Total mappings: {{ requested_interface_mappings | length }}
        - Unique source interfaces: {{ requested_interface_mappings | map(attribute='source_interface_name') | list | unique | length }}
      
      Source Interfaces in Mappings:
        {{ requested_interface_mappings | map(attribute='source_interface_name') | list | to_nice_yaml }}
      
      Action Required:
        Review your interface_mappings in the vars file and remove duplicate source_interface_name entries.
  when: >
    (requested_interface_mappings | map(attribute='source_interface_name') | list | unique | length)
    !=
    (requested_interface_mappings | map(attribute='source_interface_name') | list | length)

- name: Validate mapped destination interfaces are unique
  fail:
    msg: |
      ❌ VALIDATION ERROR: Duplicate destination interface names in interface_mappings!
      
      Migration Details:
        - Source Device: {{ source_device_display }}
        - Destination Device: {{ destination_device_display }}
        - Fabric Site: {{ migration_item.fabric_site }}
      
      Problem:
        The interface_mappings list contains duplicate destination_interface_name entries.
        Each destination interface can only be used once.
      
      Duplicate Check:
        - Total mappings: {{ requested_interface_mappings | length }}
        - Unique destination interfaces: {{ requested_interface_mappings | map(attribute='destination_interface_name') | list | unique | length }}
      
      Destination Interfaces in Mappings:
        {{ requested_interface_mappings | map(attribute='destination_interface_name') | list | to_nice_yaml }}
      
      Action Required:
        Review your interface_mappings in the vars file and remove duplicate destination_interface_name entries.
  when: >
    (requested_interface_mappings | map(attribute='destination_interface_name') | list | unique | length)
    !=
    (requested_interface_mappings | map(attribute='destination_interface_name') | list | length)

- name: Validate mapped source interfaces exist in source payload
  set_fact:
    mapped_source_interfaces_not_found: >-
      {{
        (requested_interface_mappings | map(attribute='source_interface_name') | list)
        | difference(source_interface_names)
      }}

- name: Fail when mapped source interfaces are missing in source payload
  fail:
    msg: |
      ❌ VALIDATION ERROR: Mapped source interfaces not found in source device!
      
      Migration Details:
        - Source Device: {{ source_device_display }}
        - Destination Device: {{ destination_device_display }}
        - Fabric Site: {{ migration_item.fabric_site }}
      
      Problem:
        Your interface_mappings references source interfaces that do not exist
        in the port assignments on the source device.
      
      Missing Source Interfaces:
        {{ mapped_source_interfaces_not_found | to_nice_yaml }}
      
      Available Source Interfaces:
        {{ source_interface_names | to_nice_yaml }}
      
      Action Required:
        1. Verify the source interface names are correct
        2. Check that port assignments exist on the source device for these interfaces
        3. Update your interface_mappings to use valid source interface names
  when:
    - source_has_port_assignments
    - mapped_source_interfaces_not_found | length > 0

- name: Initialize source-to-destination interface mapping lookup
  set_fact:
    interface_mapping_lookup: {}

- name: Build source-to-destination interface mapping lookup
  set_fact:
    interface_mapping_lookup: >-
      {{
        interface_mapping_lookup | combine({
          item.source_interface_name: item.destination_interface_name
        })
      }}
  loop: "{{ requested_interface_mappings }}"
  when: requested_interface_mappings | length > 0

- name: Initialize destination port assignment payload list
  set_fact:
    destination_port_assignments: []

- name: Build destination port assignment payload with optional interface remap
  set_fact:
    destination_port_assignments: >-
      {{
        destination_port_assignments + [
          item | combine({
            'interface_name': interface_mapping_lookup.get(item.interface_name, item.interface_name)
          })
        ]
      }}
  loop: "{{ source_port_assignments_for_migration }}"

- name: Validate destination interfaces are unique after remap
  fail:
    msg: |
      ❌ VALIDATION ERROR: Duplicate destination interfaces after mapping!
      
      Migration Details:
        - Source Device: {{ source_device_display }}
        - Destination Device: {{ destination_device_display }}
        - Fabric Site: {{ migration_item.fabric_site }}
      
      Problem:
        After applying interface_mappings, the resulting destination interface list
        contains duplicates. This can happen when:
        1. Multiple source interfaces map to the same destination interface
        2. A mapped interface conflicts with an unmapped interface
      
      Duplicate Check:
        - Total destination interfaces: {{ destination_port_assignments | length }}
        - Unique destination interfaces: {{ destination_port_assignments | map(attribute='interface_name') | list | unique | length }}
      
      Destination Interfaces After Mapping:
        {{ destination_port_assignments | map(attribute='interface_name') | list | to_nice_yaml }}
      
      Interface Mappings Applied:
        {{ interface_mapping_lookup | to_nice_yaml }}
      
      Action Required:
        Review your interface_mappings to ensure:
        1. No two source interfaces map to the same destination interface
        2. Mapped destination interfaces don't conflict with unmapped ones
  when: >
    (destination_port_assignments | map(attribute='interface_name') | list | unique | length)
    !=
    (destination_port_assignments | map(attribute='interface_name') | list | length)

- name: Build destination device onboarding payload from source interfaces
  set_fact:
    destination_device_onboarding_config:
      - "{{ destination_device_apply_identifier | combine({
            'fabric_site_name_hierarchy': source_device_port_assignment_entry.fabric_site_name_hierarchy | default(migration_item.fabric_site),
            'port_assignments': destination_port_assignments
          }) }}"
  vars:
    destination_device_apply_identifier: >-
      {{
        {
          'hostname': destination_resolved_device.hostname | default(migration_item.destination_device_hostname | default(''))
        }
        if destination_device_identifier_type == 'hostname'
        else {
          'ip_address': destination_resolved_device.managementIpAddress | default(migration_item.destination_device_ip | default(''))
        }
      }}

- name: Apply source port assignments to destination device
  cisco.catalystcenter.sda_host_port_onboarding_workflow_manager:
    catalystcenter_host: "{{ catalyst_center_login.catalystcenter_host }}"
    catalystcenter_username: "{{ catalyst_center_login.catalystcenter_username }}"
    catalystcenter_password: "{{ catalyst_center_login.catalystcenter_password }}"
    catalystcenter_version: "{{ catalyst_center_login.catalystcenter_version }}"
    catalystcenter_port: "{{ catalyst_center_login.catalystcenter_port }}"
    catalystcenter_verify: "{{ catalyst_center_login.catalystcenter_verify }}"
    config_verify: "{{ catalyst_center_login.config_verify }}"
    catalystcenter_debug: "{{ catalyst_center_login.catalystcenter_debug }}"
    catalystcenter_log: "{{ catalyst_center_login.catalystcenter_log }}"
    catalystcenter_log_level: "{{ catalyst_center_login.catalystcenter_log_level }}"
    catalystcenter_log_file_path: "{{ catalyst_center_login.catalystcenter_log_file_path }}"
    catalystcenter_log_append: "{{ catalyst_center_login.catalystcenter_log_append }}"
    catalystcenter_api_task_timeout: "{{ catalyst_center_login.catalystcenter_api_task_timeout }}"
    state: "{{ state | default('merged') }}"
    config: "{{ destination_device_onboarding_config }}"
  register: destination_port_assignment_apply
  failed_when: false
  when: destination_port_assignments | length > 0

- name: Check for SDK installation error in destination apply
  fail:
    msg: |
      ❌ CRITICAL ERROR: Catalyst Center Python SDK is not installed!
      
      The playbook cannot continue because the required Python SDK is missing.
      
      Error Details:
        - Module: cisco.catalystcenter.sda_host_port_onboarding_workflow_manager
        - Error: {{ destination_port_assignment_apply.module_stderr | default('SDK not found') }}
      
      To fix this issue:
        1. Activate your virtual environment:
           source venv/bin/activate  # or source /Users/pawansi/ansiblevenv/bin/activate
        
        2. Install the Catalyst Center SDK:
           pip install catalystcentersdk
        
        3. Verify installation:
           pip list | grep catalystcentersdk
        
        4. Re-run the playbook
      
      For more information, see the MIGRATION_GUIDE.md file.
  when:
    - destination_port_assignment_apply is defined
    - destination_port_assignment_apply.module_stderr is defined
    - "'catalystcentersdk' in destination_port_assignment_apply.module_stderr"

- name: Check for destination apply module failure
  fail:
    msg: |
      ❌ ERROR: Failed to apply port assignments to destination device!
      
      Migration Details:
        - Source Device: {{ source_device_display }}
        - Destination Device: {{ destination_device_display }}
        - Fabric Site: {{ migration_item.fabric_site }}
        - Interfaces to Migrate: {{ destination_port_assignments | length }}
      
      Error Details:
        - Return Code: {{ destination_port_assignment_apply.rc | default('unknown') }}
        - Status: {{ destination_port_assignment_apply.status | default('unknown') }}
        - Message: {{ destination_port_assignment_apply.msg | default('No message') }}
        - Module Error: {{ destination_port_assignment_apply.module_stderr | default('No stderr') }}
      
      Interfaces Attempted:
        {{ destination_port_assignments | map(attribute='interface_name') | list | to_nice_yaml }}
      
      Possible Causes:
        1. Destination device {{ destination_device_display }} does not exist in Catalyst Center
        2. Destination device is not part of the fabric site {{ migration_item.fabric_site }}
        3. Destination interfaces do not exist on the device
        4. Network connectivity issues with Catalyst Center
        5. Insufficient permissions for the API user
        6. Destination device is not in a ready state
      
      Troubleshooting:
        1. Verify destination device exists in Catalyst Center inventory
        2. Verify destination device is assigned to the fabric site
        3. Check that destination interfaces exist on the device
        4. Review Catalyst Center logs for more details
        5. Run with -vvv for verbose output
  when:
    - destination_port_assignment_apply is defined
    - not (destination_port_assignment_apply.module_stderr is defined and 'catalystcentersdk' in destination_port_assignment_apply.module_stderr)
    - >
      (destination_port_assignment_apply.failed | default(false))
      or
      (destination_port_assignment_apply.rc is defined and destination_port_assignment_apply.rc != 0)
      or
      (destination_port_assignment_apply.msg is defined and destination_port_assignment_apply.msg is string and 'error' in (destination_port_assignment_apply.msg | lower))
      or
      (destination_port_assignment_apply.msg is defined and destination_port_assignment_apply.msg is string and 'exception' in (destination_port_assignment_apply.msg | lower))

- name: Track skipped apply result when no source port assignment onboarding exists
  set_fact:
    destination_port_assignment_apply:
      status: "skipped_no_source_port_assignments"
      msg: >-
        No port assignment onboarding exists for source device {{ source_device_display }}
        in fabric site {{ migration_item.fabric_site }}. Nothing was applied on destination.
  when: destination_port_assignments | length == 0

- name: Initialize apply outcome reporting containers
  set_fact:
    apply_message_objects: []
    apply_message_blocks: []
    apply_message_blocks_expanded: []
    interfaces_updated_from_apply: []
    interfaces_no_change_from_apply: []

- name: Build target destination interface list for reporting
  set_fact:
    interfaces_targeted_for_migration: "{{ destination_port_assignments | map(attribute='interface_name') | list | unique | sort }}"

- name: Collect apply message objects for reporting
  set_fact:
    apply_message_objects: >-
      {{
        (
          []
          + ([destination_port_assignment_apply.msg] if destination_port_assignment_apply.msg is mapping else [])
          + ([destination_port_assignment_apply.response] if destination_port_assignment_apply.response is mapping else [])
        )
      }}

- name: Flatten apply message dictionary blocks
  set_fact:
    apply_message_blocks: >-
      {{
        (apply_message_blocks | default([]))
        + (item | dict2items | map(attribute='value') | list)
      }}
  loop: "{{ apply_message_objects }}"

- name: Expand nested apply message blocks
  set_fact:
    apply_message_blocks_expanded: >-
      {{
        (apply_message_blocks_expanded | default([]))
        + ([item] if item is mapping else [])
        + ((item | dict2items | map(attribute='value') | list) if item is mapping else [])
      }}
  loop: "{{ apply_message_blocks | default([]) }}"

- name: Collect interfaces reported as updated/created
  set_fact:
    interfaces_updated_from_apply: "{{ (interfaces_updated_from_apply | default([])) + item.success_interfaces }}"
  loop: "{{ apply_message_blocks_expanded | default([]) }}"
  when:
    - item is mapping
    - item.success_interfaces is defined
    - item.success_interfaces is sequence
    - item.success_interfaces is not string

- name: Collect interfaces reported as no-change
  set_fact:
    interfaces_no_change_from_apply: "{{ (interfaces_no_change_from_apply | default([])) + item.port_assignments_no_update_needed }}"
  loop: "{{ apply_message_blocks_expanded | default([]) }}"
  when:
    - item is mapping
    - item.port_assignments_no_update_needed is defined
    - item.port_assignments_no_update_needed is sequence
    - item.port_assignments_no_update_needed is not string

- name: Normalize apply outcome interface lists
  set_fact:
    interfaces_updated_from_apply: "{{ interfaces_updated_from_apply | default([]) | unique | sort }}"
    interfaces_no_change_from_apply: "{{ interfaces_no_change_from_apply | default([]) | unique | sort }}"
    interfaces_unreported_from_apply: >-
      {{
        (interfaces_targeted_for_migration | difference(
          ((interfaces_updated_from_apply | default([])) + (interfaces_no_change_from_apply | default([]))) | unique
        )) | sort
      }}

- name: Track migration result
  set_fact:
    port_assignment_migration_results: >-
      {{
        (port_assignment_migration_results | default([])) + [
          {
            'fabric_site': migration_item.fabric_site,
            'source_device_identifier': source_device_display,
            'destination_device_identifier': destination_device_display,
            'source_device_identifier_type': source_device_identifier_type,
            'destination_device_identifier_type': destination_device_identifier_type,
            'source_device_ip': source_resolved_device.managementIpAddress | default(migration_item.source_device_ip | default('')),
            'source_device_hostname': source_resolved_device.hostname | default(migration_item.source_device_hostname | default('')),
            'source_device_serial_number': source_resolved_device.serialNumber | default(migration_item.source_device_serial_number | default('')),
            'destination_device_ip': destination_resolved_device.managementIpAddress | default(migration_item.destination_device_ip | default('')),
            'destination_device_hostname': destination_resolved_device.hostname | default(migration_item.destination_device_hostname | default('')),
            'destination_device_serial_number': destination_resolved_device.serialNumber | default(migration_item.destination_device_serial_number | default('')),
            'source_export_filter_mode': source_export_filter_mode | default('unknown'),
            'interface_mapping_count': requested_interface_mappings | length,
            'interfaces_moved': interfaces_targeted_for_migration | default([]),
            'interfaces_moved_count': interfaces_targeted_for_migration | default([]) | length,
            'interfaces_targeted': interfaces_targeted_for_migration | default([]),
            'interfaces_targeted_count': interfaces_targeted_for_migration | default([]) | length,
            'interfaces_updated': interfaces_updated_from_apply | default([]),
            'interfaces_updated_count': interfaces_updated_from_apply | default([]) | length,
            'interfaces_no_change': interfaces_no_change_from_apply | default([]),
            'interfaces_no_change_count': interfaces_no_change_from_apply | default([]) | length,
            'interfaces_unreported': interfaces_unreported_from_apply | default([]),
            'interfaces_unreported_count': interfaces_unreported_from_apply | default([]) | length,
            'catalyst_center_change_count': interfaces_updated_from_apply | default([]) | length,
            'catalyst_center_changed': (interfaces_updated_from_apply | default([]) | length) > 0,
            'generated_file': generated_source_config_file_path,
            'generator_status': source_port_assignment_export.status | default('unknown'),
            'migration_status': destination_port_assignment_apply.status | default('unknown')
          }
        ]
      }}

- name: Remove generated source config file
  ansible.builtin.file:
    path: "{{ generated_source_config_file_path }}"
    state: absent
  when: cleanup_generated_files | default(true) | bool
  changed_when: false
