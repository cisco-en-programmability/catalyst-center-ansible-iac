---
- name: Gather Fabric Device Information from Cisco Catalyst Center
  hosts: catalyst_center_hosts
  connection: local
  gather_facts: false
  vars_files:
    - "{{ VARS_FILE_PATH }}"
  vars:
    catalyst_center_login: &catalyst_center_login
      catalystcenter_host: "{{ catalyst_center_host | default(dnac_host) }}"
      catalystcenter_username: "{{ catalyst_center_username | default(dnac_username) }}"
      catalystcenter_password: "{{ catalyst_center_password | default(dnac_password) }}"
      catalystcenter_version: "{{ catalyst_center_version | default(dnac_version) }}"
      catalystcenter_port: "{{ catalyst_center_port | default(443) }}"
      catalystcenter_verify: "{{ catalyst_center_verify | default(False) }}"
      config_verify: "{{ catalyst_center_config_verify | default(False) }}"
      catalystcenter_debug: "{{ catalyst_center_debug | default(False) }}"
      catalystcenter_log: "{{ catalyst_center_log | default(False) }}"
      catalystcenter_log_level: "{{ catalyst_center_log_level | default('INFO') }}"
      catalystcenter_log_file_path: "{{ catalyst_center_log_file_path | default(omit) }}"
      catalystcenter_log_append: "{{ catalyst_center_log_append | default(False) }}"
      catalystcenter_api_task_timeout: "{{ catalyst_center_api_task_timeout | default(1200) }}"

  tasks:
    - name: Gather fabric device information from Cisco Catalyst Center
      cisco.catalystcenter.fabric_devices_info_workflow_manager:
        <<: *catalyst_center_login
        state: gathered
        config: "{{ fabric_device_info_details }}"
      register: result_fabric_device_info

    - name: Display fabric device information gathering status
      debug:
        msg:
          - "Fabric device information gathering status: {{ result_fabric_device_info.status }}"
          - "Number of query sets processed: {{ result_fabric_device_info.response | length }}"

    - name: Display fabric device information results
      debug:
        var: result_fabric_device_info

    - name: Display fabric device information summary
      debug:
        msg:
          - "Fabric Device Info workflow completed"
          - "Total devices queried: {{ result_fabric_device_info.response[0]| regex_findall(\"'([^']+)'\") | length }}"
          - "Total devices found: {{ result_fabric_device_info.response[0] }}"
          - "Status: {{ result_fabric_device_info.status }}"
      when: result_fabric_device_info.status == "success"